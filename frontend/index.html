<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Beastlife AI Query Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 40px;
      text-align: center;
    }
    h1 {
      color: #333;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    #result {
      margin-top: 20px;
      text-align: left;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
      min-height: 60px;
    }
  </style>
</head>
<body>
  <h1>🤖 AI Query Analyzer</h1>

  <div class="container">
    <label>Platform</label>
    <select id="platformSelect">
      <option>Website Chat</option>
      <option>Instagram DMs</option>
      <option>WhatsApp</option>
      <option>Email</option>
    </select>

    <label>Customer Message</label>
    <textarea id="messageInput" rows="4" placeholder="Type customer query..."></textarea>

    <button id="analyzeBtn">Analyze Query</button>

    <div id="result"></div>
  </div>

  <script>
    const API_BASE_URL = "https://ai-powered-customer-support-analytics-e7c1.onrender.com";

    const analyzeBtn = document.getElementById("analyzeBtn");
    const messageInput = document.getElementById("messageInput");
    const platformSelect = document.getElementById("platformSelect");
    const resultBox = document.getElementById("result");

    analyzeBtn.addEventListener("click", async () => {
      const message = messageInput.value.trim();
      const platform = platformSelect.value;

      if (!message) {
        alert("Please enter a message");
        return;
      }

      resultBox.innerHTML = "⏳ Analyzing...";

      try {
        const response = await fetch(`${API_BASE_URL}/api/queries`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message, platform })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        resultBox.innerHTML = `
          <h3>✅ Analysis Result</h3>
          <p><strong>Message:</strong> ${data.message}</p>
          <p><strong>Category:</strong> ${data.category}</p>
          <p><strong>Confidence:</strong> ${data.confidence}%</p>
          <p><strong>Status:</strong> ${data.status}</p>
          <p><strong>Automatable:</strong> ${data.automatable ? "Yes" : "No"}</p>
          <p><strong>Platform:</strong> ${data.platform}</p>
          <p><strong>Suggested Reply:</strong> ${data.suggestedResponse || "Not available"}</p>
        `;
      } catch (error) {
        console.error(error);
        resultBox.innerHTML = "❌ Failed to analyze query. Please try again.";
      }
    });
  </script>
</body>
</html>
