<!DOCTYPE html>
<html>
<head>
  <title>Beastlife Dashboard</title>
</head>
<body>
  <h1>Customer Support AI</h1>

  <input id="query" placeholder="Enter customer query"/>
  <button onclick="sendQuery()">Analyze</button>

  <h3 id="result"></h3>

  <script>
  async function sendQuery() {
    const text = document.getElementById("query").value;
    document.getElementById("result").innerText = "Analyzing...";

    try {
      const res = await fetch("https://ai-powered-customer-support-analytics-nrxa.onrender.com/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      document.getElementById("result").innerText = "Category: " + data.category;

    } catch (err) {
      document.getElementById("result").innerText = "Error connecting to server";
    }
  }
</script>
  
</body>
</html>
